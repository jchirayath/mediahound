version: 2
updates:
  # Python runtime/dev dependencies (pyproject.toml / requirements.txt)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies"]

  # Keep the GitHub Actions used in workflows up to date (also clears Node-version deprecations)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "ci"]
