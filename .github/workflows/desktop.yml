name: Build desktop app

# Builds the double-clickable MediaHound app for macOS and Windows with PyInstaller.
# Runs on demand, or attaches zipped builds to a published GitHub Release.
on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write
  actions: read       # SignPath downloads the unsigned build artifact to sign it

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: MediaHound-macOS
          - os: windows-latest
            artifact: MediaHound-Windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install + build
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[desktop,build]"
          pyinstaller --noconfirm --clean packaging/mediahound.spec

      # --- Optional code-signing (runs only when the signing secrets are configured) ---
      # See SIGNING.md for the secrets these steps expect. Without them, builds are
      # unsigned (a Gatekeeper/SmartScreen prompt appears on first open).
      - name: Sign & notarize (macOS, via Fastlane)
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          MAC_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          # notarization via App Store Connect API key (preferred) …
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_FILE: ${{ secrets.ASC_KEY_FILE }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
          # … or fall back to an app-specific password:
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CERTIFICATE_P12:-}" ]; then echo "No Apple signing secrets — shipping unsigned."; exit 0; fi
          # import the Developer ID cert into a temporary keychain so codesign can find it
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p actions "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p actions "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          printf '%s' "$APPLE_CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions "$KEYCHAIN"
          # if using the App Store Connect API key path, materialize the .p8 from a base64 secret
          if [ -n "${ASC_KEY_P8_BASE64:-}" ]; then
            printf '%s' "$ASC_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
            echo "ASC_KEY_FILE=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"
          fi
          # codesign + notarize + staple through Fastlane (fastlane/Fastfile :sign lane)
          bundle install
          bundle exec fastlane mac sign

      - name: Sign (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_CERT_PFX: ${{ secrets.WINDOWS_CERT_PFX }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          if (-not $env:WINDOWS_CERT_PFX) { Write-Host "No Windows signing secret — shipping unsigned."; exit 0 }
          $pfx = Join-Path $env:RUNNER_TEMP "cert.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERT_PFX))
          $signtool = (Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" | Select-Object -Last 1).FullName
          & $signtool sign /f $pfx /p $env:WINDOWS_CERT_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 "dist\MediaHound\MediaHound.exe"

      # --- Free OSS code-signing via SignPath Foundation (self-skips without a token) ---
      # Setup: apply at https://signpath.org → create the project, connect this repo as a
      # trusted build, then add secret SIGNPATH_API_TOKEN + var SIGNPATH_ORGANIZATION_ID.
      # See SIGNING.md.
      - name: Check SignPath config
        if: runner.os == 'Windows'
        id: signpath
        shell: bash
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
        run: |
          if [ -n "${SIGNPATH_API_TOKEN:-}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "No SignPath token — Windows build stays unsigned."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload unsigned exe for SignPath
        if: runner.os == 'Windows' && steps.signpath.outputs.enabled == 'true'
        id: unsigned_exe
        uses: actions/upload-artifact@v7
        with:
          name: MediaHound-exe-unsigned
          path: dist/MediaHound/MediaHound.exe

      - name: Sign with SignPath
        if: runner.os == 'Windows' && steps.signpath.outputs.enabled == 'true'
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: mediahound
          signing-policy-slug: ${{ vars.SIGNPATH_POLICY_SLUG || 'release-signing' }}
          github-artifact-id: ${{ steps.unsigned_exe.outputs.artifact-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          wait-for-completion: true
          output-artifact-directory: signed

      - name: Swap in the SignPath-signed exe
        if: runner.os == 'Windows' && steps.signpath.outputs.enabled == 'true'
        shell: bash
        run: cp signed/MediaHound.exe dist/MediaHound/MediaHound.exe

      - name: Zip the build
        shell: bash
        run: |
          cd dist
          if [ "$RUNNER_OS" = "macOS" ]; then
            ditto -c -k --sequesterRsrc --keepParent "MediaHound.app" "../${{ matrix.artifact }}.zip"
          else
            7z a "../${{ matrix.artifact }}.zip" "MediaHound" >/dev/null
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3   # v3 runs on Node 24 (v2 was Node 20, now deprecated)
        with:
          files: ${{ matrix.artifact }}.zip
