name: Publish to PyPI

# Builds the sdist + wheel and publishes to PyPI via Trusted Publishing (OIDC — no
# API tokens stored anywhere). Runs when a GitHub Release is published, or manually.
# One-time setup is required on PyPI — see RELEASING.md.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write          # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check the artifacts
        run: |
          python -m pip install twine
          twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
