name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"   # weekly, Monday 06:00 UTC — re-runs tests + CVE audit
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Ruff lint
        run: |
          pip install ruff
          ruff check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run tests with coverage (offline, no keys)
        run: pytest --cov=mediahound --cov-report=term-missing --cov-fail-under=50
      - name: Smoke-test the mock build end-to-end
        run: |
          mediahound init /tmp/demo
          mediahound build --config /tmp/demo/config.toml --mock
          test -f /tmp/demo/data/collection.json
          test -f /tmp/demo/data/bundle.js
          echo "Mock catalog built OK"

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Scan dependencies for known CVEs
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --progress-spinner off
