# Self-host MediaHound (QNAP Container Station, Synology, any Docker host).
# 1) Put your library on the NAS and point the volume below at it.
# 2) `docker compose up -d`  →  open http://<nas-ip>:8765
services:
  mediahound:
    build: .
    container_name: mediahound
    restart: unless-stopped
    ports:
      - "8765:8765"
    volumes:
      # ← change the left side to your library path on the NAS
      # (the folder that holds config.toml, data/, RawImages/, posters/, originals/)
      - ./library:/library
    # The image default runs combined mode: `app --phone` = view + admin editing +
    # phone uploads, all on the LAN. Grab the phone-pairing QR/URL from the logs:
    #   docker compose logs mediahound   (or Container Station's log viewer)
    # Want view-only (no phone, no admin write)? Override:
    # command: ["mediahound", "serve", "--host", "0.0.0.0", "--port", "8765", "--no-open", "--config", "/library/config.toml"]
