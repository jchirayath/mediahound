<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 320" role="img" aria-label="MediaHound">
  <defs>
    <linearGradient id="mhBgL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF7A5C"/><stop offset="1" stop-color="#E11D48"/>
    </linearGradient>
  </defs>
  <g transform="translate(8,8) scale(0.59)">
  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#mhBgL)"/>
  <!-- rabbit-ear TV antennas -->
  <g stroke="#FFE3D7" stroke-width="12" stroke-linecap="round" fill="none">
    <path d="M232 132 L196 64"/><path d="M280 132 L316 64"/>
  </g>
  <circle cx="192" cy="58" r="11" fill="#FFE3D7"/><circle cx="320" cy="58" r="11" fill="#FFE3D7"/>
  <!-- long hound ears drooping below the headphones -->
  <path d="M168 330 C120 350 108 430 138 452 C166 442 168 372 188 348 Z" fill="#F4E4D9"/>
  <path d="M344 330 C392 350 404 430 374 452 C346 442 344 372 324 348 Z" fill="#F4E4D9"/>
  <!-- head -->
  <ellipse cx="256" cy="312" rx="108" ry="116" fill="#FFFFFF"/>
  <!-- headphones: band + cups -->
  <path d="M156 318 C156 200 356 200 356 318" fill="none" stroke="#2A2F3A" stroke-width="22" stroke-linecap="round"/>
  <circle cx="156" cy="322" r="40" fill="#2A2F3A"/><circle cx="156" cy="322" r="20" fill="#FF8E73"/>
  <circle cx="356" cy="322" r="40" fill="#2A2F3A"/><circle cx="356" cy="322" r="20" fill="#FF8E73"/>
  <!-- eyes -->
  <circle cx="221" cy="302" r="18" fill="#3A1020"/><circle cx="291" cy="302" r="18" fill="#3A1020"/>
  <circle cx="227" cy="296" r="6" fill="#FFFFFF"/><circle cx="297" cy="296" r="6" fill="#FFFFFF"/>
  <!-- muzzle + play-button nose -->
  <ellipse cx="256" cy="366" rx="46" ry="34" fill="#F0D5C9"/>
  <path d="M244 348 L244 384 L278 366 Z" fill="#E11D48"/>
</g>
  <text x="330" y="205" font-family="'Trebuchet MS','Segoe UI',Helvetica,Arial,sans-serif" font-size="150" font-weight="700" letter-spacing="-3"><tspan fill="#1f2430">Media</tspan><tspan fill="#E11D48">Hound</tspan></text>
</svg>